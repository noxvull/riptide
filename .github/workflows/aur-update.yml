name: Update AUR

on:
  push:
    tags:
      - 'v*'

jobs:
  aur-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Sync Cargo.toml version to tag
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" Cargo.toml
          sed -i "/^name = \"riptide\"$/{n;s/^version = \"[^\"]*\"/version = \"$VERSION\"/}" Cargo.lock
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Cargo.toml Cargo.lock
          if git diff --staged --quiet; then
            echo "Cargo.toml already at $VERSION, nothing to do"
          else
            git commit -m "chore: set version to $VERSION"
            git push origin HEAD:refs/heads/main
            git tag -f ${{ github.ref_name }}
            git push origin ${{ github.ref_name }} --force
          fi

      - name: Download tarball and compute sha256sum
        id: sha256
        run: |
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.ref_name }}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "SHA256=$SHA" >> $GITHUB_OUTPUT

      - name: Set up SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          cat >> ~/.ssh/config << EOF
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
            StrictHostKeyChecking no
          EOF

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/riptide.git aur-riptide

      - name: Update PKGBUILD
        run: |
          cd aur-riptide
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.VERSION }}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/sha256sums=('.*')/sha256sums=('${{ steps.sha256.outputs.SHA256 }}')/" PKGBUILD
          sed -i "s|riptide-[0-9]*\.[0-9]*\.[0-9]*\.tar\.gz|riptide-${{ steps.version.outputs.VERSION }}.tar.gz|g" PKGBUILD
          sed -i "s|/tags/v[0-9]*\.[0-9]*\.[0-9]*\.tar\.gz|/tags/v${{ steps.version.outputs.VERSION }}.tar.gz|g" PKGBUILD

      - name: Update .SRCINFO
        run: |
          cd aur-riptide
          sed -i "s/pkgver = .*/pkgver = ${{ steps.version.outputs.VERSION }}/" .SRCINFO
          sed -i "s/pkgrel = .*/pkgrel = 1/" .SRCINFO
          sed -i "s/sha256sums = .*/sha256sums = ${{ steps.sha256.outputs.SHA256 }}/" .SRCINFO
          # Update source URL version
          sed -i "s|riptide-[0-9]*\.[0-9]*\.[0-9]*\.tar\.gz|riptide-${{ steps.version.outputs.VERSION }}.tar.gz|g" .SRCINFO
          sed -i "s|/tags/v[0-9]*\.[0-9]*\.[0-9]*\.tar\.gz|/tags/v${{ steps.version.outputs.VERSION }}.tar.gz|g" .SRCINFO

      - name: Commit and push to AUR
        run: |
          cd aur-riptide
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add PKGBUILD .SRCINFO
          git diff --staged --quiet || git commit -m "update to ${{ github.ref_name }}"
          git push
